version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cybersec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cybersec_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cybersec_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybersec_net

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cybersec_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cybersec_net

  # ─── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybersec_backend
    restart: unless-stopped
    environment:
      APP_NAME: "CyberSec Portal"
      APP_ENV: production
      DEBUG: "false"
      SECRET_KEY: "change-me-super-secret-key-min-32-chars-!!!"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/cybersec_db"
      DATABASE_URL_SYNC: "postgresql://postgres:postgres@postgres:5432/cybersec_db"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET_KEY: "change-me-jwt-secret-key-min-32-chars-!!!"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ALLOWED_ORIGINS: "http://localhost:3000"
      RATE_LIMIT_PER_MINUTE: "120"
      ADMIN_EMAIL: "admin@cybersec.local"
      ADMIN_PASSWORD: "Admin@123456"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cybersec_net
    volumes:
      - ./backend:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cybersec_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cybersec_net

# ─── Volumes & Networks ───────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cybersec_net:
    driver: bridge
